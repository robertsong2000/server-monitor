<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Monitor</title>
<!-- Chart.js（CDN，仅趋势图依赖） -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- 样式表 -->
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<!-- 顶栏 -->
<header>
  <h1><span class="logo">📡</span> Server Monitor</h1>
  <div class="header-actions">
    <div class="refresh-indicator">
      <span class="dot"></span>
      <span id="refreshLabel">自动刷新中</span>
    </div>
    <button class="btn-ghost btn-sm" onclick="App.refresh()">立即刷新</button>
    <button class="btn-primary" onclick="Modals.openAdd()">+ 添加服务</button>
  </div>
</header>

<!-- 主区域（概览 + 卡片网格由 JS 渲染） -->
<div class="summary" id="summary"></div>
<div class="grid" id="grid"></div>

<!-- 添加/编辑服务模态框 -->
<div class="modal-overlay" id="serviceModal">
  <div class="modal">
    <h2 id="modalTitle">添加服务</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="f_name" placeholder="例如：生产数据库">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>检查类型</label>
        <select id="f_type" onchange="Modals.onTypeChange()">
          <option value="tcp">TCP 端口</option>
          <option value="http">HTTP/HTTPS</option>
          <option value="icmp">ICMP Ping</option>
        </select>
      </div>
      <div class="form-group">
        <label>检查间隔（秒）</label>
        <input type="number" id="f_interval" value="30" min="5">
      </div>
    </div>
    <div class="form-group">
      <label>主机 (Host)</label>
      <input type="text" id="f_host" placeholder="例如：127.0.0.1 或 example.com">
    </div>
    <div class="form-row">
      <div class="form-group" id="portGroup">
        <label>端口</label>
        <input type="number" id="f_port" placeholder="3306">
      </div>
      <div class="form-group" id="pathGroup" style="display:none">
        <label>路径</label>
        <input type="text" id="f_path" placeholder="/health">
      </div>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="f_enabled" checked style="width:auto;margin-right:6px">
        启用监控
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="Modals.closeService()">取消</button>
      <button class="btn-primary" onclick="App.saveService()">保存</button>
    </div>
  </div>
</div>

<!-- 历史趋势图模态框 -->
<div class="modal-overlay" id="chartModal">
  <div class="modal chart-modal">
    <h2 id="chartTitle">响应时间趋势</h2>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="Modals.closeChart()">关闭</button>
    </div>
  </div>
</div>

<!-- toast 容器 -->
<div class="toast" id="toast"></div>

<!-- 脚本：按依赖顺序加载（utils → api → services → charts → modals → app） -->
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/services.js"></script>
<script src="js/charts.js"></script>
<script src="js/modals.js"></script>
<script src="js/app.js"></script>
</body>
</html>
